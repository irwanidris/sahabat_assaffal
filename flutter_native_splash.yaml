flutter_native_splash:
  # Latar belakang biru muda untuk mod biasa
  color: "#B3E5FC"
  
  # Latar belakang gelap untuk mod malam
  color_dark: "#1a1a2e"
  
  # Imej ikon yang anda baru tukar
  image: assets/images/logo_s_assaffal.png
  image_dark: assets/images/logo_s_assaffal.png
  
  # Tetapan untuk Android 12 ke atas
  android_12:
    color: "#B3E5FC"
    color_dark: "#1a1a2e"
    image: assets/images/logo_s_assaffal.png
    image_dark: assets/images/logo_s_assaffal.png
    icon_background_color: "#B3E5FC"
    icon_background_color_dark: "#1a1a2e"
  
  ios: true
  android: true
  web: true
  fullscreen: true
