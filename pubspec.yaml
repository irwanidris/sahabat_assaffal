name: sahabat_assaffal
description: "Sahabat Assaffal - Road safety reporting app"
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.10.3
  geolocator: ^14.0.2
  image_picker: ^1.2.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  cached_network_image: ^3.4.1
  http: ^1.6.0
  google_fonts: ^6.3.3
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  geocoding: ^4.0.0
  url_launcher: ^6.3.2
  flutter_native_splash: ^2.4.7
  share_plus: ^12.0.1
  device_info_plus: ^12.3.0
  google_mlkit_image_labeling: ^0.14.1
  camera: ^0.11.1
  google_sign_in: ^6.2.1
  onesignal_flutter: ^5.5.0
  intl: ^0.19.0
  webview_flutter: ^4.10.0
  shared_preferences: ^2.5.3
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/logo_s_assaffal.png"
  android_12:
    image: "assets/images/logo_s_assaffal.png"
    color: "#FFFFFF"
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - shorebird.yaml
